services:
  tellegen:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      TELLEGEN_PORT: "8000"
    volumes:
      # Operator-staged TAMU case data (scripts/stage-data.sh). Without all
      # three cases, the server exits unless TELLEGEN_ALLOW_FALLBACK=1 is set.
      - ./data:/app/data:ro
    mem_limit: 6g
    pids_limit: 512
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
