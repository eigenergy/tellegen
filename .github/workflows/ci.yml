name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Test the tellegen backend, then build the wasm module before the tellegen
  # frontend imports it.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo test --workspace
        env:
          TELLEGEN_ALLOW_FALLBACK: "1"
      # The conic SOCWR path is off by default (it ships only in the sensitivity wasm), so
      # the workspace test above never exercises it. Run it explicitly so a SOCWR regression
      # (e.g. the zero-impedance-jumper infeasibility) fails the PR instead of the browser.
      - run: cargo test -p tellegen --features conic
      - name: Install wasm-pack
        run: |
          curl -fsSL https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/wasm-pack.tar.gz
          echo 'c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a  /tmp/wasm-pack.tar.gz' | sha256sum -c -
          tar -xzf /tmp/wasm-pack.tar.gz -C "$HOME/.cargo/bin" --strip-components=1 --wildcards '*/wasm-pack'
          rm -f /tmp/wasm-pack.tar.gz
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # `npm run wasm` builds the wasm package from crates/tellegen-wasm with the
      # correct out-name (single source of truth in the engine package).
      - run: npm run wasm
      - run: npm run check:engine
      - run: npm run build:engine
      - run: npm run test:import
      - run: npm --workspace tellegen-frontend exec playwright install --with-deps chromium
      - run: npm run lint:web
      - run: npm run check:svelte
      - run: npm run test:svelte
      - run: npm run check:web
      - run: npm run test:svelte-packed
      # build:web rebuilds @tellegen/svelte, which check:web (just above) already
      # built; call the frontend build directly to skip that redundant rebuild.
      - run: npm --workspace tellegen-frontend run build
      - run: npm run smoke:web
      - run: npm run test:browser

  # Format, lint, and supply chain. Keeps the shipping crates warning-clean and the
  # whole dependency graph on permissive licenses (Apache-2.0/MIT).
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo fmt --all --check
      - run: cargo clippy -p tellegen -p tellegen-wasm -p tellegen-server -p tellegen-cli --all-targets -- -D warnings
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Build the shipped Docker image and smoke test it on PRs. deploy.yml only builds
  # the image on push to main, so without this a Dockerfile or workspace-config break
  # (e.g. a default-members change that desyncs the Dockerfile's `--bin` selection)
  # passes PR CI and only fails post-merge on the deploy. No GHCR push; PR-only so it
  # does not duplicate the image build deploy.yml already runs on main.
  image:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (load locally for the smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: tellegen:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test image
        run: |
          docker rm -f tellegen-smoke >/dev/null 2>&1 || true
          docker run \
            --detach \
            --name tellegen-smoke \
            --publish 127.0.0.1:8000:8000 \
            --env TELLEGEN_ALLOW_FALLBACK=1 \
            --read-only \
            --tmpfs /tmp:size=64m,noexec,nosuid,nodev \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 512 \
            tellegen:ci
          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8000/api/health && curl -fsS http://127.0.0.1:8000/ | grep -q 'tellegen'; then
              exit 0
            fi
            echo "waiting for container health ($attempt/90)"
            sleep 10
          done
          docker logs --tail=200 tellegen-smoke
          exit 1
      - name: Stop smoke container
        if: always()
        run: docker rm -f tellegen-smoke >/dev/null 2>&1 || true
