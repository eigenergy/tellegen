name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Test the tellegen backend, then build the wasm module before the tellegen
  # frontend imports it.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo test --manifest-path rust/Cargo.toml
      - name: Install wasm-pack
        run: |
          curl -fsSL https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C "$HOME/.cargo/bin" --strip-components=1 --wildcards '*/wasm-pack'
      - run: wasm-pack build rust --target web --out-dir ../frontend/src/lib/wasm-pkg -- --no-default-features
        env:
          RUSTFLAGS: -C target-feature=-simd128,-relaxed-simd
      - run: wasm-pack build rust --target web --out-dir ../frontend/src/lib/wasm-sens-pkg --out-name tellegen_sens
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run check
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run smoke:build
        working-directory: frontend

  # Julia reference: PowerIO from the General registry, PowerDiff from the git
  # rev in [sources]. This is not the production backend.
  julia-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - uses: julia-actions/cache@v2
      - name: Instantiate Julia reference
        run: julia --project=reference/julia-backend -e 'using Pkg; Pkg.instantiate()'
      - run: TELLEGEN_ALLOW_FALLBACK=1 julia --project=reference/julia-backend reference/julia-backend/test/runtests.jl
