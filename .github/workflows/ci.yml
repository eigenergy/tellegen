name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Test the tellegen backend, then build the wasm module before the tellegen
  # frontend imports it.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo test -p tellegen -p tellegen-wasm -p tellegen-server
        env:
          TELLEGEN_ALLOW_FALLBACK: "1"
      - name: Install wasm-pack
        run: |
          curl -fsSL https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/wasm-pack.tar.gz
          echo 'c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a  /tmp/wasm-pack.tar.gz' | sha256sum -c -
          tar -xzf /tmp/wasm-pack.tar.gz -C "$HOME/.cargo/bin" --strip-components=1 --wildcards '*/wasm-pack'
          rm -f /tmp/wasm-pack.tar.gz
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      # `npm run wasm` builds both wasm packages from crates/tellegen-wasm with the
      # correct out-names and RUSTFLAGS (single source of truth in package.json).
      - run: npm run wasm
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run check
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - run: npm run smoke:build
        working-directory: apps/web

  # Format, lint, supply chain, and the EPL boundary. Keeps the shipping crates
  # warning-clean. The native server ships the EPL-2.0 pounce backend as its default
  # AC OPF solver (approved: EPL-2.0 is weak file-level copyleft, acknowledged in
  # NOTICE / LICENSE-EPL). The boundary enforced below keeps pounce OUT of the browser
  # wasm and the CLI, which stay Apache-2.0/MIT.
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo fmt --all --check
      - run: cargo clippy -p tellegen -p tellegen-wasm -p tellegen-server -p tellegen-cli --all-targets -- -D warnings
      - uses: EmbarkStudios/cargo-deny-action@v2
      - name: EPL boundary (pounce stays out of the browser wasm and the CLI)
        run: |
          # The browser wasm ships with --features acopf (the interiors backend), and the
          # CLI stays on its default features; both must remain EPL-free (Apache-2.0/MIT).
          # The native server ships pounce as its default AC OPF backend by design.
          if cargo tree -p tellegen-wasm --target wasm32-unknown-unknown --features acopf 2>/dev/null | grep -qi pounce; then
            echo "EPL pounce leaked into the browser wasm build" >&2; exit 1
          fi
          if cargo tree -p tellegen-cli --all-features 2>/dev/null | grep -qi pounce; then
            echo "EPL pounce leaked into tellegen-cli" >&2; exit 1
          fi
          echo "ok: browser wasm + CLI are EPL-free; the native server ships pounce by design"
