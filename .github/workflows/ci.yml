name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Build the wasm module before the frontend that imports it.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - run: wasm-pack build rust --target web --out-dir ../frontend/src/lib/wasm-pkg
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run check
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  # Backend: PowerIO from the General registry (compat-pinned in Project.toml),
  # PowerDiff from the git rev in [sources]. Resolves fresh each run.
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - uses: julia-actions/cache@v2
      - name: Instantiate backend
        run: julia --project=backend -e 'using Pkg; Pkg.instantiate()'
      - run: TELLEGEN_ALLOW_FALLBACK=1 julia --project=backend backend/test/runtests.jl
