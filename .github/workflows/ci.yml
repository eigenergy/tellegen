name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Test the tellegen backend, then build the wasm module before the tellegen
  # frontend imports it.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo test -p tellegen-core -p tellegen-wasm -p tellegen-server
        env:
          TELLEGEN_ALLOW_FALLBACK: "1"
      - name: Install wasm-pack
        run: |
          curl -fsSL https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/wasm-pack.tar.gz
          echo 'c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a  /tmp/wasm-pack.tar.gz' | sha256sum -c -
          tar -xzf /tmp/wasm-pack.tar.gz -C "$HOME/.cargo/bin" --strip-components=1 --wildcards '*/wasm-pack'
          rm -f /tmp/wasm-pack.tar.gz
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      # `npm run wasm` builds both wasm packages from crates/tellegen-wasm with the
      # correct out-names and RUSTFLAGS (single source of truth in package.json).
      - run: npm run wasm
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run check
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - run: npm run smoke:build
        working-directory: apps/web

  # Julia reference: PowerIO from the General registry, PowerDiff from the git
  # rev in [sources]. This is not the production backend.
  julia-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - uses: julia-actions/cache@v2
      - name: Instantiate Julia reference
        run: julia --project=reference/julia-backend -e 'using Pkg; Pkg.instantiate()'
      - run: TELLEGEN_ALLOW_FALLBACK=1 julia --project=reference/julia-backend reference/julia-backend/test/runtests.jl
