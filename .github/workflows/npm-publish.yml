name: Publish Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "engine-v*"
      - "svelte-v*"

permissions:
  contents: read
  id-token: write

jobs:
  engine:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/engine-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Install wasm-pack
        run: |
          curl -fsSL https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/wasm-pack.tar.gz
          echo 'c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a  /tmp/wasm-pack.tar.gz' | sha256sum -c -
          tar -xzf /tmp/wasm-pack.tar.gz -C "$HOME/.cargo/bin" --strip-components=1 --wildcards '*/wasm-pack'
          rm -f /tmp/wasm-pack.tar.gz
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run wasm
      - run: npm run check:engine
      - run: npm run build:engine
      - run: npm run test:import
      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/engine-v')
        run: |
          version="$(npm pkg get version --workspace @tellegen/engine | tr -d '"')"
          tag="${GITHUB_REF_NAME#engine-v}"
          if [ "$version" != "$tag" ]; then
            echo "tag engine-v$tag does not match @tellegen/engine version $version"
            exit 1
          fi
      - name: Pack dry run
        run: npm --workspace @tellegen/engine pack --dry-run
      - name: Create package artifact directory
        run: mkdir -p "$RUNNER_TEMP/tellegen-package"
      - name: Pack artifact
        run: npm --workspace @tellegen/engine pack --pack-destination "$RUNNER_TEMP/tellegen-package"
      - uses: actions/upload-artifact@v4
        with:
          name: tellegen-engine-package
          path: ${{ runner.temp }}/tellegen-package/tellegen-engine-*.tgz
          if-no-files-found: error
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/engine-v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm --workspace @tellegen/engine publish --provenance --access public

  svelte:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/svelte-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Install wasm-pack
        run: |
          curl -fsSL https://github.com/wasm-bindgen/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/wasm-pack.tar.gz
          echo 'c09f971ecaed9a2efc80fdcea7a00ef6b53c7fadc8c57d1f61b53a6aa66b668a  /tmp/wasm-pack.tar.gz' | sha256sum -c -
          tar -xzf /tmp/wasm-pack.tar.gz -C "$HOME/.cargo/bin" --strip-components=1 --wildcards '*/wasm-pack'
          rm -f /tmp/wasm-pack.tar.gz
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run wasm
      - run: npm run build:engine
      - run: npm run check:svelte
      - run: npm run build:svelte
      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/svelte-v')
        run: |
          version="$(npm pkg get version --workspace @tellegen/svelte | tr -d '"')"
          tag="${GITHUB_REF_NAME#svelte-v}"
          if [ "$version" != "$tag" ]; then
            echo "tag svelte-v$tag does not match @tellegen/svelte version $version"
            exit 1
          fi
      - name: Pack dry run
        run: npm run pack:svelte
      - name: Downstream packed package smoke
        run: npm run test:svelte-packed
      - name: Create package artifact directory
        run: mkdir -p "$RUNNER_TEMP/tellegen-package"
      - name: Pack artifact
        run: npm --workspace @tellegen/svelte pack --pack-destination "$RUNNER_TEMP/tellegen-package"
      - uses: actions/upload-artifact@v4
        with:
          name: tellegen-svelte-package
          path: ${{ runner.temp }}/tellegen-package/tellegen-svelte-*.tgz
          if-no-files-found: error
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/svelte-v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm --workspace @tellegen/svelte publish --provenance --access public
