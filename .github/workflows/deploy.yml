name: Deploy Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: tellegen-deploy-${{ github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  frontend:
    if: vars.TELLEGEN_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo test --manifest-path rust/Cargo.toml
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked
      - run: wasm-pack build rust --target web --out-dir ../frontend/src/lib/wasm-pkg -- --no-default-features
        env:
          RUSTFLAGS: -C target-feature=-simd128,-relaxed-simd
      - run: wasm-pack build rust --target web --out-dir ../frontend/src/lib/wasm-sens-pkg --out-name tellegen_sens
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run check
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run smoke:build
        working-directory: frontend

  image:
    if: vars.TELLEGEN_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    needs: [frontend]
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      main_tag: ${{ steps.meta.outputs.main_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tags
        id: meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            echo "image=$image"
            echo "sha_tag=$image:${GITHUB_SHA}"
            echo "main_tag=$image:main"
          } >> "$GITHUB_OUTPUT"
      - name: Build image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.sha_tag }}" \
            --tag "${{ steps.meta.outputs.main_tag }}" \
            .
      - name: Smoke test image
        run: |
          docker rm -f tellegen-smoke >/dev/null 2>&1 || true
          docker run \
            --detach \
            --name tellegen-smoke \
            --publish 127.0.0.1:8000:8000 \
            --env TELLEGEN_ALLOW_FALLBACK=1 \
            "${{ steps.meta.outputs.sha_tag }}"
          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8000/api/health && curl -fsS http://127.0.0.1:8000/ | grep -q 'tellegen'; then
              exit 0
            fi
            echo "waiting for container health ($attempt/90)"
            sleep 10
          done
          docker logs --tail=200 tellegen-smoke
          exit 1
      - name: Stop smoke container
        if: always()
        run: docker rm -f tellegen-smoke >/dev/null 2>&1 || true
      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.sha_tag }}"
          docker push "${{ steps.meta.outputs.main_tag }}"

  deploy:
    if: vars.TELLEGEN_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    needs: image
    environment: demo
    env:
      DEPLOY_HOST: ${{ secrets.TELLEGEN_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.TELLEGEN_DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.TELLEGEN_DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.TELLEGEN_DEPLOY_PATH }}
      DEMO_URL: ${{ secrets.TELLEGEN_DEMO_URL }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.TELLEGEN_DEPLOY_KNOWN_HOSTS }}
      TELLEGEN_IMAGE: ${{ needs.image.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate deploy secrets
        run: |
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH DEMO_URL; do
            if [ -z "${!name}" ]; then
              echo "$name is not set"
              exit 1
            fi
          done
      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/tellegen_deploy
          chmod 600 ~/.ssh/tellegen_deploy
          # Pin the host key from a secret when provided; otherwise fall back to
          # trust-on-first-use (a spoofed host could intercept that one deploy).
          if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            echo "TELLEGEN_DEPLOY_KNOWN_HOSTS not set; trusting the host key on first contact" >&2
            ssh-keyscan -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts
      - name: Copy deploy files
        run: |
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          ssh -i ~/.ssh/tellegen_deploy "$remote" "mkdir -p '$DEPLOY_PATH/deploy'"
          scp -i ~/.ssh/tellegen_deploy \
            deploy/docker-compose.prod.yml \
            deploy/docker-compose.edge.yml \
            deploy/remote-deploy.sh \
            "$remote:$DEPLOY_PATH/deploy/"
      - name: Deploy image
        run: |
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          ssh -i ~/.ssh/tellegen_deploy "$remote" "
            cd '$DEPLOY_PATH' &&
            bash deploy/remote-deploy.sh '$TELLEGEN_IMAGE' '$DEPLOY_PATH/data'
          "
      - name: Check public health
        run: |
          health_url="${DEMO_URL%/}/api/health"
          for attempt in $(seq 1 30); do
            health=$(curl -fsS "$health_url") || {
              echo "waiting for public health ($attempt/30)"
              sleep 10
              continue
            }
            if [[ "$health" == *'"case200"'* && "$health" == *'"case500"'* && "$health" == *'"case2000"'* ]]; then
              exit 0
            fi
            echo "unexpected public health payload: $health"
            if [ "$attempt" -lt 30 ]; then
              echo "waiting for public health ($attempt/30)"
              sleep 10
            fi
          done
          echo "public health check failed: $health_url"
          exit 1
