name: Deploy Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - run: wasm-pack build rust --target web --out-dir ../frontend/src/lib/wasm-pkg
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run check
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - uses: julia-actions/cache@v2
      - name: Instantiate backend
        run: julia --project=backend -e 'using Pkg; Pkg.instantiate()'
      - run: julia --project=backend backend/test/runtests.jl

  image:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      main_tag: ${{ steps.meta.outputs.main_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tags
        id: meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            echo "image=$image"
            echo "sha_tag=$image:${GITHUB_SHA}"
            echo "main_tag=$image:main"
          } >> "$GITHUB_OUTPUT"
      - name: Build image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.sha_tag }}" \
            --tag "${{ steps.meta.outputs.main_tag }}" \
            .
      - name: Smoke test image
        run: |
          docker rm -f tellegen-smoke >/dev/null 2>&1 || true
          docker run \
            --detach \
            --name tellegen-smoke \
            --publish 127.0.0.1:8000:8000 \
            "${{ steps.meta.outputs.sha_tag }}"
          for attempt in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8000/api/health; then
              exit 0
            fi
            echo "waiting for container health ($attempt/90)"
            sleep 10
          done
          docker logs --tail=200 tellegen-smoke
          exit 1
      - name: Stop smoke container
        if: always()
        run: docker rm -f tellegen-smoke >/dev/null 2>&1 || true
      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.sha_tag }}"
          docker push "${{ steps.meta.outputs.main_tag }}"

  deploy:
    runs-on: ubuntu-latest
    needs: image
    environment: demo
    env:
      DEPLOY_HOST: ${{ secrets.TELLEGEN_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.TELLEGEN_DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.TELLEGEN_DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.TELLEGEN_DEPLOY_PATH }}
      DEMO_URL: ${{ secrets.TELLEGEN_DEMO_URL }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.TELLEGEN_DEPLOY_KNOWN_HOSTS }}
      TELLEGEN_IMAGE: ${{ needs.image.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate deploy secrets
        run: |
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH DEMO_URL; do
            if [ -z "${!name}" ]; then
              echo "$name is not set"
              exit 1
            fi
          done
      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/tellegen_deploy
          chmod 600 ~/.ssh/tellegen_deploy
          # Pin the host key from a secret when provided; otherwise fall back to
          # trust-on-first-use (a spoofed host could intercept that one deploy).
          if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            echo "TELLEGEN_DEPLOY_KNOWN_HOSTS not set; trusting the host key on first contact" >&2
            ssh-keyscan -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts
      - name: Copy compose file
        run: |
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          ssh -i ~/.ssh/tellegen_deploy "$remote" "mkdir -p '$DEPLOY_PATH/deploy' '$DEPLOY_PATH/data'"
          scp -i ~/.ssh/tellegen_deploy \
            deploy/docker-compose.prod.yml \
            "$remote:$DEPLOY_PATH/deploy/docker-compose.prod.yml"
      - name: Deploy image
        run: |
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          ssh -i ~/.ssh/tellegen_deploy "$remote" "
            cd '$DEPLOY_PATH' &&
            printf 'TELLEGEN_IMAGE=%s\nTELLEGEN_DATA_DIR=%s\n' '$TELLEGEN_IMAGE' '$DEPLOY_PATH/data' > .env &&
            docker compose --env-file .env -f deploy/docker-compose.prod.yml pull tellegen &&
            docker compose --env-file .env -f deploy/docker-compose.prod.yml up -d --remove-orphans
          "
      - name: Check host health
        run: |
          remote="$DEPLOY_USER@$DEPLOY_HOST"
          ssh -i ~/.ssh/tellegen_deploy "$remote" "
            for i in \$(seq 1 90); do
              health=\$(curl -fsS http://127.0.0.1:8000/api/health) || {
                sleep 10
                continue
              }
              case \"\$health\" in
                *'\"case200\"'*'\"case2000\"'*'\"case500\"'*)
                  exit 0
                  ;;
              esac
              echo \"unexpected health payload: \$health\"
              if [ \"\$i\" -lt 90 ]; then
                sleep 10
              fi
            done
            cd '$DEPLOY_PATH'
            docker compose --env-file .env -f deploy/docker-compose.prod.yml logs --tail=200 tellegen
            exit 1
          "
      - name: Check public health
        run: |
          health_url="${DEMO_URL%/}/api/health"
          for attempt in $(seq 1 30); do
            health=$(curl -fsS "$health_url") || {
              echo "waiting for public health ($attempt/30)"
              sleep 10
              continue
            }
            case "$health" in
              *'"case200"'*'"case2000"'*'"case500"'*)
                exit 0
                ;;
            esac
            echo "unexpected public health payload: $health"
            if [ "$attempt" -lt 30 ]; then
              echo "waiting for public health ($attempt/30)"
              sleep 10
            fi
          done
          echo "public health check failed: $health_url"
          exit 1
