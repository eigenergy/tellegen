# Overlay for hosts where an existing reverse proxy owns ports 80 and 443.
# Rename `edge` to the proxy network on the host.
#
# docker compose -f docker-compose.yml -f deploy/docker-compose.edge.yml up -d --build
services:
  tellegen:
    container_name: tellegen
    networks:
      - default
      - edge

networks:
  edge:
    external: true
