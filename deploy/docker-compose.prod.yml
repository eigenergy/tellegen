name: tellegen

services:
  tellegen:
    image: ${TELLEGEN_IMAGE:?set TELLEGEN_IMAGE}
    container_name: tellegen
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      TELLEGEN_PORT: "8000"
    volumes:
      - ${TELLEGEN_DATA_DIR:?set TELLEGEN_DATA_DIR}:/app/data:ro
    mem_limit: 6g
    pids_limit: 512
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
