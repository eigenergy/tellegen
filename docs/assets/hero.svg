    <g transform="translate(118,126)">
      <text x="0" y="0" fill="#20242b" font-family="Bricolage Grotesque, Inter, Arial, sans-serif" font-size="126" font-weight="650" letter-spacing="0">tellegen</text>
      <text x="6" y="62" fill="#59616a" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="24" letter-spacing="0">reactive visualization for power systems optimization</text>
      <g transform="translate(8,100)" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="17" letter-spacing="0">
        <rect x="0" y="0" width="188" height="38" rx="5" fill="#fcfbf7" fill-opacity="0.76" stroke="#c8c0b2"/>
        <text x="18" y="25" fill="#20242b">browser parse</text>
        <rect x="206" y="0" width="172" height="38" rx="5" fill="#fcfbf7" fill-opacity="0.76" stroke="#c8c0b2"/>
        <text x="224" y="25" fill="#20242b">dLMP/dd</text>
        <rect x="396" y="0" width="176" height="38" rx="5" fill="#fcfbf7" fill-opacity="0.76" stroke="#c8c0b2"/>
        <text x="414" y="25" fill="#20242b">streamed solve</text>
