<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 820" role="img" aria-labelledby="title desc">
  <title id="title">tellegen hero</title>
  <desc id="desc">A power system network over a muted map field, showing browser parsing, sensitivities, and streamed solves.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf5"/>
      <stop offset="0.48" stop-color="#eee9df"/>
      <stop offset="1" stop-color="#d9e2e3"/>
    </linearGradient>
    <linearGradient id="flow" x1="120" y1="650" x2="1500" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4b78a8"/>
      <stop offset="0.44" stop-color="#d3b45f"/>
      <stop offset="1" stop-color="#c95f32"/>
    </linearGradient>
    <linearGradient id="signal" x1="720" y1="620" x2="1400" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6c7f98"/>
      <stop offset="0.55" stop-color="#a97d35"/>
      <stop offset="1" stop-color="#cf6a2d"/>
    </linearGradient>
    <radialGradient id="nodeWarm" cx="50%" cy="42%" r="65%">
      <stop offset="0" stop-color="#ffd27b"/>
      <stop offset="0.62" stop-color="#d8792f"/>
      <stop offset="1" stop-color="#8f3d21"/>
    </radialGradient>
    <radialGradient id="nodeCool" cx="46%" cy="40%" r="68%">
      <stop offset="0" stop-color="#dcecf1"/>
      <stop offset="0.7" stop-color="#66849b"/>
      <stop offset="1" stop-color="#324659"/>
    </radialGradient>
    <pattern id="minorGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#2d3138" stroke-width="1" opacity="0.055"/>
    </pattern>
    <pattern id="majorGrid" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect width="160" height="160" fill="url(#minorGrid)"/>
      <path d="M160 0H0V160" fill="none" stroke="#2d3138" stroke-width="1.4" opacity="0.09"/>
    </pattern>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#20242b" flood-opacity="0.16"/>
    </filter>
    <filter id="tinyShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#20242b" flood-opacity="0.22"/>
    </filter>
    <clipPath id="rounded">
      <rect x="16" y="16" width="1768" height="788" rx="36"/>
    </clipPath>
  </defs>

  <rect x="16" y="16" width="1768" height="788" rx="36" fill="url(#bg)"/>
