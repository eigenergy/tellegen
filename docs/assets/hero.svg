<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">tellegen</title>
  <desc id="desc">The tellegen wordmark and three node mark on a quiet power flow trace.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcfbf7"/>
      <stop offset="1" stop-color="#ece9e2"/>
    </linearGradient>
    <linearGradient id="flow" x1="520" y1="196" x2="1072" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6f787e"/>
      <stop offset="0.5" stop-color="#b25e00"/>
      <stop offset="1" stop-color="#20242b"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="1" height="1">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.035"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="280" rx="18" fill="url(#paper)"/>
  <rect width="1200" height="280" rx="18" filter="url(#grain)" opacity="0.55"/>

  <g opacity="0.42" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M42 210C156 154 239 198 337 142C421 94 487 112 570 87C667 57 720 80 804 57C894 32 957 70 1060 44C1102 33 1134 26 1162 24"
