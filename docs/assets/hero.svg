      <text x="24" y="73" fill="#59616a" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="0">local file stays in browser</text>
      <text x="24" y="101" fill="#59616a" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="0">drop sidecar or place topology</text>
