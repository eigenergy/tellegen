# Supply-chain governance for the tellegen workspace.
#
# Every crate in the resolved graph must carry a permissive license. The list below is
# the whole allow-set; anything not on it fails the check. This branch ships only the
# convex/relaxation engine (Clarabel + faer), so the whole tree is Apache-2.0/MIT and
# compatible permissive licenses — there is no copyleft dependency to carve out.

[licenses]
# Anything not listed here is denied. Permissive licenses only; copyleft is excluded
# by omission.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[advisories]
# RustSec advisory DB. Security advisories fail the check; add IDs to `ignore` only
# with a documented rationale.
ignore = [
    # `paste` (proc-macro helper) was archived by its author — an unmaintained notice,
    # not a vulnerability. Pulled in transitively by faer -> gemm -> pulp for SIMD
    # codegen; there is no safe upgrade until that matmul stack drops it. Re-evaluate
    # on faer upgrades. https://rustsec.org/advisories/RUSTSEC-2024-0436
    "RUSTSEC-2024-0436",
]

[bans]
# Surface accidental duplicate versions without failing the build.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
